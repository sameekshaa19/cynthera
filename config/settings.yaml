system:
  timeout_seconds: 30
  max_retries: 3
  backoff_factor: 1.5

caching:
  enabled: true
  ttl_seconds: 604800  # 7 Days

models:
  extraction_model: "gemini-1.5-flash"
  temperature: 0.0

scoring_weights:
  support:
    meta_analysis_weight: 1.00
    rct_weight: 0.85
    observational_weight: 0.65
    in_vivo_weight: 0.50
    in_vitro_weight: 0.30
    computational_weight: 0.15
  mechanism:
    primary_target_weight: 0.6
    pathway_overlap_weight: 0.4
  risk:
    clinical_failure_penalty: 1.0
    contradiction_penalty: 0.5
    feedback_loop_penalty: 0.8
    safety_termination_penalty: 0.8

recommendation_thresholds:
  promising:
    min_support: 0.40
    min_mechanism: 0.40
    max_risk: 0.39
  not_recommended:
    max_support: 0.39
    max_mechanism: 0.39
    min_risk: 0.70

apis:
  pubmed:
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
    timeout: 30
    rate_limit: 3
  chembl:
    base_url: "https://www.ebi.ac.uk/chembl/api/data"
    timeout: 30
  uniprot:
    base_url: "https://rest.uniprot.org"
    timeout: 30
  reactome:
    base_url: "https://reactome.org/ContentService"
    timeout: 30
  clinicaltrials:
    base_url: "https://clinicaltrials.gov/api/v2"
    timeout: 30
  disgenet:
    base_url: "https://www.disgenet.org/api"
    timeout: 30

logging:
  level: "INFO"
  file: "logs/cynthera.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
