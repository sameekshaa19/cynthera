# Agentic AI Drug Repurposing - Configuration

# API Endpoints (All Free)
apis:
  pubchem:
    base_url: "https://pubchem.ncbi.nlm.nih.gov/rest/pug"
    timeout: 30
  
  chembl:
    base_url: "https://www.ebi.ac.uk/chembl/api/data"
    timeout: 30
  
  pubmed:
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
    timeout: 30
    rate_limit: 3  # requests per second (10 with API key)
  
  reactome:
    base_url: "https://reactome.org/ContentService"
    timeout: 30
  
  wikipathways:
    base_url: "https://webservice.wikipathways.org"
    timeout: 30
  
  disgenet:
    base_url: "https://www.disgenet.org/api"
    timeout: 30
  
  uniprot:
    base_url: "https://rest.uniprot.org"
    timeout: 30

# Confidence Thresholds
confidence:
  high: 0.75
  medium: 0.50
  low: 0.25

# Agent Settings
agents:
  timeout: 120  # seconds
  max_retries: 3
  
# LLM Settings
llm:
  provider: "local"  # Options: "local", "openai", "anthropic", "none"
  model: "llama3"  # For local: llama3, mistral; For OpenAI: gpt-4, gpt-3.5-turbo
  temperature: 0.3
  max_tokens: 2000

# Caching
cache:
  enabled: true
  directory: "./cache"
  ttl: 86400  # 24 hours in seconds

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/cynthera.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Vector Database
vector_db:
  type: "chromadb"
  persist_directory: "./chroma_db"
  collection_name: "drug_repurposing_knowledge"
